<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Advanced To Do List</title>
    <link rel="stylesheet" href="advanced-todo.css">
</head>
<body>
    
    <label for="#slide-btn"> Click Here To Customize Colors </label>
    <button id="slide-btn"> ⚙️ </button>

    <div class="slide-container">
       
        <h2> Customize Your To Do List Colors </h2>
     
        <h3> Choose Your Tasks Container Color ⬇️</h3>
     <input type="color" id="todo-color-inp">
     <input type="color" id="todo-color-inp2">


        <h3> Choose Your Tasks Color ⬇️</h3>
     <input type="color" id="task-color-inp">
     <input type="color" id="task-color-inp2">
 
     <button id="reset-clr"> Reset To Default Colors </button>
    
    </div>

    <div class="todo-cont">
    <h1> Welcome to this To-Do </h1>
    <input type="text" id="input-text" placeholder="Please Write a Task">
    
    <div class="taskcontainer-btns">
    <button id="addB"> Add a Task </button>
    <button id="clr-all"> Clear All Tasks </button>
    </div>
    
    <ul id="task-list">

        </ul>
    </div>

<script src="advanced-todo.js"></script>
</body>
</html>
